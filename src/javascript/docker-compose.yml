version: '3.8'

services:
  tubrica-js:
    build: .
    container_name: tubrica-javascript
    ports:
      - "3000:3000"
    volumes:
      - ./routes.db:/app/routes.db
      - ./routes.db-shm:/app/routes.db-shm
      - ./routes.db-wal:/app/routes.db-wal
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
