version: '3.8'

services:
  tubrica-php:
    build: .
    container_name: tubrica-php
    ports:
      - "8080:80"
    volumes:
      - ./routes.db:/var/www/html/routes.db
      - ./routes.db-shm:/var/www/html/routes.db-shm
      - ./routes.db-wal:/var/www/html/routes.db-wal
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s